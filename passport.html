<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Passport Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0a] text-white p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <h1 class="text-4xl font-serif italic" id="displayID">PLA-SERIAL</h1>
            <a href="index.html" class="opacity-50 hover:opacity-100 text-sm tracking-widest uppercase">← BACK</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 auto-rows-[180px]">
            
            <div class="md:col-span-2 md:row-span-2 glass-card rounded-[2rem] p-8 border border-white/5 flex flex-col justify-between">
                <div>
                    <span class="text-xs font-bold text-green-500 uppercase tracking-widest">System Health</span>
                    <h2 class="text-6xl font-serif mt-4" id="status">Healthy</h2>
                </div>
                <div class="w-full bg-white/10 h-2 rounded-full overflow-hidden">
                    <div class="bg-green-500 h-full w-[85%]"></div>
                </div>
            </div>

            <div class="glass-card rounded-[2rem] p-6 border border-white/5">
                <span class="text-xs opacity-50 uppercase">Voltage</span>
                <p class="text-3xl font-serif mt-2" id="voltage">--</p>
            </div>

            <div class="glass-card rounded-[2rem] p-6 border border-white/5">
                <span class="text-xs opacity-50 uppercase">Specific Gravity</span>
                <p class="text-3xl font-serif mt-2" id="gravity">--</p>
            </div>

            <div class="md:col-span-2 glass-card rounded-[2rem] p-6 border border-white/5 flex items-center justify-between">
                <div>
                    <span class="text-xs opacity-50 uppercase">Physical Integrity</span>
                    <p class="text-2xl font-serif" id="integrity">Grade A Verified</p>
                </div>
                <div class="h-12 w-12 rounded-full border-2 border-green-500 flex items-center justify-center text-green-500">✓</div>
            </div>

            <div class="glass-card rounded-[2rem] p-6 border border-white/5">
                <span class="text-xs opacity-50 uppercase">Expiry Date</span>
                <p class="text-xl font-serif mt-2" id="expiryDate">--</p>
            </div>

            <div class="glass-card rounded-[2rem] p-6 border border-green-500/20 bg-green-500/5">
                <span class="text-xs text-green-400 uppercase">Buy-Back Credit</span>
                <p class="text-2xl font-serif mt-2" id="buyback">--</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
