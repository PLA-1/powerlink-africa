
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Link Africa Ltd | Digital Battery Passport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <nav class="p-4 bg-white shadow-md flex justify-between items-center glass-panel sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Power Link Logo" class="h-12 w-auto">
            <h1 class="text-xl font-bold text-green-800 logo-header hidden md:block">POWER LINK AFRICA</h1>
        </div>
        <div class="space-x-6">
            <a href="index.html" class="font-bold hover:text-green-700">HOME</a>
            <a href="passport.html" class="bg-green-700 text-white px-5 py-2 rounded font-bold">VERIFY</a>
        </div>
    </nav>

    <section class="max-w-6xl mx-auto py-20 px-6 text-center">
        <h2 class="text-5xl font-extrabold mb-6 text-gray-800">The Future of <span class="text-green-600">Battery Transparency</span></h2>
        <p class="text-xl text-gray-600 mb-10 max-w-2xl mx-auto">Track lifecycle, verify health, and access the circular economy with the Digital Battery Passport.</p>
        
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md mx-auto border-t-4 border-green-600">
            <h3 class="font-bold text-lg mb-4">Track Your Battery</h3>
            <input type="text" id="batteryInput" placeholder="Enter Battery ID (e.g. PLA-001)" class="w-full border p-3 rounded-lg mb-4 focus:outline-green-500">
            <button onclick="checkPassport()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">View Digital Passport</button>
        </div>
    </section>

    <script>
        function checkPassport() {
            const id = document.getElementById('batteryInput').value;
            if(id) {
                window.location.href = `passport.html?id=${id}`;
            } else {
                alert("Please enter a valid Battery ID");
            }
        }
    </script>
</body>
</html>
